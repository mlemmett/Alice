
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alice Neural Interface</title>
    <style>
        body {
            background-color: #000000; /* Pure black */
            color: #00ffcc;           /* Alice Cyan */
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .interface-container {
            width: 90%;
            max-width: 500px;
            min-height: 300px; /* Forces it to have height */
            border: 2px solid #00ffcc; /* Thick glowing border */
            padding: 20px;
            background: #111111;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="interface-container">
        <h2 style="margin-top: 0;">ALICE NEURAL INTERFACE</h2>
        <hr style="border: 0.5px solid #333;">
        <p style="margin-top: 20px;">> SYSTEM ONLINE</p>
        <p>> ENCRYPTION ACTIVE</p>
        <div style="margin-top: 40px; border: 1px solid #333; padding: 10px; color: #666;">
            Waiting for input...
        </div>
    </div>
<script>
    const input = document.querySelector('input');
    const container = document.querySelector('.interface-container');

    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const msg = input.value;
            if (!msg) return;

            input.value = ''; // Clear box immediately for a fast feel

            // This sends the text from your phone to your Render server
            fetch('/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            })
            .then(res => res.json())
            .then(data => {
                const p = document.createElement('p');
                p.textContent = "> " + data.reply;
                p.style.color = "#00ffcc";
                container.appendChild(p);
            });
        }
    });
</script>
</body>
</html>
